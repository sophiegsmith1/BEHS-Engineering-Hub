<!DOCTYPE html>
<html lang="en">
<head>
    <title>Binary Battleship | BEHS Engineering</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js"></script>
    <style>
        /* Specific game-only overrides */
        :root {
            --terminal-green: #00ff41;
            --cell-size: clamp(25px, 4vw, 35px);
        }
        .board-area { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .grid-game { display: grid; gap: 4px; padding: 5px; background: #111; border-radius: 4px; }
        .cell { width: var(--cell-size); height: var(--cell-size); display: flex; align-items: center; justify-content: center; border-radius: 3px; font-size: 14px; font-family: 'Space Grotesk', sans-serif; }
        .label-game { color: var(--behs-red); font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; width: var(--cell-size); height: var(--cell-size); }
        .water { background: #222; border: 1px solid #333; }
        .ship  { background: #444; border: 1px solid var(--behs-red); }
        .hit   { background: var(--behs-red); color: white; font-weight: bold; }
        .miss  { background: #333; color: #555; }
        .log { margin-top: 20px; color: var(--terminal-green); font-family: 'Courier New', monospace; background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--behs-red); font-size: 13px; min-height: 40px; }
        input.error { border-color: #ff0000 !important; background: #200 !important; }
        .cheatsheet { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; color: #aaa; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="menu-toggle" id="menu-toggle">☰</div>
<div id="sidebar-container"></div>

<main class="main">
    <nav class="breadcrumb">
        <a href="../index.html">Home</a> / <span>Binary Battleship</span>
    </nav>

    <header>
        <h1>Binary Battleship</h1>
        <div class="subtitle">Tactical Binary Coordination Trainer</div>
    </header>

    <div class="card" style="margin-bottom: 20px; display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;">
        <select id="modeSelect" class="search" style="width: auto; margin: 0;">
            <option value="random">Random Mode</option>
            <option value="practice">Practice Mode</option>
        </select>
        <input id="shipCount" type="number" min="3" max="10" value="5" class="search" style="width: 70px; margin: 0;">
        <select id="gridSize" class="search" style="width: auto; margin: 0;">
            <option value="8">8x8 (3-bit)</option>
            <option value="16">16x16 (4-bit)</option>
        </select>
        <button id="startBtn" class="media-btn podcast" style="padding: 10px 20px;">System Start</button>
        <button id="toggleCheat" class="media-btn article" style="padding: 10px 20px;">Decoder Key</button>
    </div>

    <div class="board-area">
        <div class="card">
            <h3>Player Systems</h3>
            <div class="grid-game" id="playerGrid"></div>
        </div>
        <div class="card">
            <h3>Enemy Matrix</h3>
            <div class="grid-game" id="oppGrid"></div>
        </div>
    </div>

    <div id="cheatWrap" style="display:none; margin-top: 20px;">
        <div class="card">
            <h3>Binary Decoder</h3>
            <div class="cheatsheet" id="cheatContent"></div>
        </div>
    </div>

    <div class="card" style="margin-top: 20px; text-align: center;">
        <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
            <input id="rowInput" type="text" placeholder="ROW BIN" maxlength="4" class="search" style="width: 100px; margin: 0; text-align: center;">
            <span style="color:var(--behs-red); font-weight: bold;">X</span>
            <input id="colInput" type="text" placeholder="COL BIN" maxlength="4" class="search" style="width: 100px; margin: 0; text-align: center;">
            <button id="fireBtn" class="media-btn video" style="padding: 10px 25px;">Fire Strike</button>
        </div>
        <div class="log" id="log">Initialize system to begin...</div>
    </div>

    <footer style="margin-top: 30px; text-align: center; color: #555; font-size: 0.8rem;">
        Grid decimal labels provided for reference. Coordinates must be entered in <strong>BINARY</strong>.
    </footer>
</main>

<script>
// --- [YOUR ORIGINAL GAME LOGIC START] ---
(() => {
    let size = 8, oppGrid=[], playerGrid=[], playerShips=[], cpuShips=[];
    let playerShipsRemaining=0, cpuShipsRemaining=0, cpuTargets=[];

    const playerGridEl=document.getElementById('playerGrid');
    const oppGridEl=document.getElementById('oppGrid');
    const shipCountInput=document.getElementById('shipCount');
    const gridSizeSelect=document.getElementById('gridSize');
    const startBtn=document.getElementById('startBtn');
    const rowInput=document.getElementById('rowInput');
    const colInput=document.getElementById('colInput');
    const fireBtn=document.getElementById('fireBtn');
    const logEl=document.getElementById('log');
    const toggleCheat=document.getElementById('toggleCheat');
    const cheatWrap=document.getElementById('cheatWrap');
    const cheatContent=document.getElementById('cheatContent');

    function log(msg){ logEl.innerHTML= `> ${msg}`; }
    function bitsNeeded(n){ return Math.max(1,Math.ceil(Math.log2(n))); }
    function decToBin(num,bits){ return num.toString(2).padStart(bits,'0'); }
    function binToDec(b){ if(!b) return NaN; b=b.trim(); if(!/^[01]+$/.test(b)) return NaN; return parseInt(b,2); }
    function makeGrid(n){ return Array.from({length:n},()=>Array.from({length:n},()=>({hasShip:false,hit:false,miss:false}))); }
    
    function clearGrids(){ 
        oppGrid=makeGrid(size); 
        playerGrid=makeGrid(size); 
        cpuTargets=[]; 
    }

    function renderGrid(container,grid,revealShips){
        container.innerHTML='';
        const n=grid.length;
        container.style.gridTemplateColumns=`repeat(${n+1}, auto)`;
        const corner=document.createElement('div'); corner.className='label-game'; container.appendChild(corner);
        for(let c=0;c<n;c++){const lbl=document.createElement('div'); lbl.className='label-game'; lbl.textContent=c; container.appendChild(lbl);}
        for(let r=0;r<n;r++){
            const rowLbl=document.createElement('div'); rowLbl.className='label-game'; rowLbl.textContent=r; container.appendChild(rowLbl);
            for(let c=0;c<n;c++){
                const cell=document.createElement('div'); cell.className='cell water';
                const state=grid[r][c];
                if(state.hit){cell.className='cell hit'; cell.textContent='✖';}
                else if(state.miss){cell.className='cell miss'; cell.textContent='•';}
                else if(state.hasShip && revealShips){cell.className='cell ship';}
                container.appendChild(cell);
            }
        }
    }

    function placeShipsRandomly(grid, shipSizes){
        const n=grid.length; const placedShips=[];
        for(const len of shipSizes){
            let placed=false; let attempts=0;
            while(!placed && attempts<500){
                attempts++;
                const horiz=Math.random()<0.5;
                const r=Math.floor(Math.random()*(horiz?n:n-len+1));
                const c=Math.floor(Math.random()*(horiz?n-len+1:n));
                let ok=true;
                for(let i=0;i<len;i++){
                    const rr=r+(horiz?0:i), cc=c+(horiz?i:0);
                    if(grid[rr][cc].hasShip){ok=false; break;}
                }
                if(!ok) continue;
                const cells=[];
                for(let i=0;i<len;i++){const rr=r+(horiz?0:i), cc=c+(horiz?i:0); grid[rr][cc].hasShip=true; cells.push([rr,cc]);}
                placedShips.push({cells,hits:0});
                placed=true;
            }
        }
        return placedShips;
    }

    function setupGame(){
        size=parseInt(gridSizeSelect.value)||8;
        let count=parseInt(shipCountInput.value)||5;
        let sizes = [5,4,3,3,2,2,2,2,2,2].slice(0, count);
        clearGrids();
        cpuShips=placeShipsRandomly(oppGrid,sizes); 
        playerShips=placeShipsRandomly(playerGrid,sizes);
        playerShipsRemaining=count; cpuShipsRemaining=count;
        renderGrid(playerGridEl,playerGrid,true); 
        renderGrid(oppGridEl,oppGrid,false); 
        
        cheatContent.innerHTML='';
        const bits=bitsNeeded(size-1);
        for(let i=0;i<size;i++){
            const div=document.createElement('div'); 
            div.innerHTML=`<span style="color:var(--behs-red)">${i}:</span> ${decToBin(i,bits)}`; 
            cheatContent.appendChild(div);
        }
        log(`System Ready. Grid: ${size}x${size}. Ships: ${count}.`);
    }

    function playerAttack(){
        const r=binToDec(rowInput.value), c=binToDec(colInput.value);
        if(isNaN(r)||isNaN(c)||r<0||c<0||r>=size||c>=size){ log('ERROR: Invalid binary strike coordinates.'); return; }
        const cell=oppGrid[r][c];
        if(cell.hit||cell.miss){ log('Target already engaged.'); return; }
        
        if(cell.hasShip){
            cell.hit=true;
            const ship=cpuShips.find(s=>s.cells.some(([sr,sc])=>sr===r && sc===c));
            ship.hits++;
            if(ship.hits===ship.cells.length){ cpuShipsRemaining--; log('CRITICAL HIT: Enemy vessel neutralized!'); }
            else log('HIT: Target confirmed.');
        } else {
            cell.miss=true; log('MISS: No target detected.');
        }
        renderGrid(oppGridEl,oppGrid,false);
        if(cpuShipsRemaining<=0){ log('VICTORY: Enemy fleet silenced.'); return; }
        setTimeout(cpuAttack, 800);
    }

    function cpuAttack(){
        let r,c,cell;
        do{ r=Math.floor(Math.random()*size); c=Math.floor(Math.random()*size); cell=playerGrid[r][c]; }
        while(cell.hit||cell.miss);
        if(cell.hasShip){
            cell.hit=true; playerShipsRemaining--;
            log(`WARNING: Friendly vessel hit at [${r},${c}]!`);
        } else {
            cell.miss=true; log(`CPU strike at [${r},${c}] missed.`);
        }
        renderGrid(playerGridEl,playerGrid,true);
        if(playerShipsRemaining<=0) log('DEFEAT: Systems compromised.');
    }

    startBtn.onclick=setupGame;
    fireBtn.onclick=playerAttack;
    toggleCheat.onclick=()=>{cheatWrap.style.display=cheatWrap.style.display==='none'?'block':'none';};
})();
// --- [YOUR ORIGINAL GAME LOGIC END] ---
</script>

</body>
</html>
