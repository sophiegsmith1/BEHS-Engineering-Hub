<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLTW Article Resources | BEHS Engineering</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/BEHS-Engineering-Hub/css/style.css">

    <style>
/* The Main Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 25px;
    padding: 20px 0;
}

/* Glassmorphism Card Style - Matching your Index Tabs */
.media-card {
    position: relative;
    background: rgba(255, 255, 255, 0.03); /* Very subtle white tint */
    backdrop-filter: blur(12px); /* Frosted glass effect */
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-left: 6px solid #ff4d4d; /* Thick highlight border */
    border-radius: 12px;
    padding: 45px 25px 25px 25px;
    display: flex;
    flex-direction: column;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    min-height: 240px;
    overflow: hidden;
}

/* Hover Effect: Slide and Glow */
.media-card:hover {
    background: rgba(255, 255, 255, 0.07);
    transform: translateX(8px); /* Slide right like the index menu */
    border-color: rgba(255, 255, 255, 0.2);
    border-left-color: #ff8080; 
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

/* Category Label - Pinned Top Right */
.category-label {
    position: absolute;
    top: 12px;
    right: 15px; /* Moved to right to avoid clashing with the red border */
    color: #ff4d4d;
    font-size: 0.6rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    background: rgba(255, 77, 77, 0.12);
    padding: 3px 10px;
    border-radius: 20px; /* Pill shape */
}

/* Icon Area - Aligned Left like Index Tabs */
.card-image {
    margin-bottom: 12px;
    display: flex;
    justify-content: flex-start;
}

.card-icon {
    width: 42px;
    height: 42px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px rgba(255, 77, 77, 0.2));
}

/* Typography */
.media-card h3 {
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.2rem;
    margin: 5px 0 20px 0;
    line-height: 1.4;
    font-weight: 600;
}

/* Button Container */
.media-links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: auto; /* Keeps buttons at the bottom */
}

/* Button Styling */
.media-btn {
    font-size: 0.75rem;
    padding: 8px 14px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.2s ease;
    border: 1px solid rgba(255,255,255,0.1);
}

.media-btn.article { background: rgba(255,255,255,0.05); color: #eee; }
.media-btn.podcast { background: #d4af37; color: #111; border: none; cursor: pointer; }
.media-btn.video   { background: #ff4d4d; color: #fff; border: none; }

.media-btn:hover {
    opacity: 0.9;
    transform: translateY(-2px);
}
    </style>
</head>
<body>

    <div class="menu-toggle" id="menu-toggle">☰</div>
    
    <div id="sidebar-container"></div>

    <div class="main">
        <nav class="breadcrumb">
            <a href="/BEHS-Engineering-Hub/index.html">Home</a> / <span>Article Resources</span>
        </nav>

        <h1>PLTW Article Resources</h1>
        <p class="subtitle">Multimedia supplements for the PLTW Curriculum. Search by unit, topic, or media type.</p>

        <div class="search-container">
            <input type="text" id="resourceSearch" onkeyup="filterResources()" placeholder="Search (e.g. 'IED', 'Design Process', 'Video')...">
        </div>

        <div class="grid" id="resource-grid">
            <div style="color: #666; padding: 20px;">Initializing Resource Database...</div>
        </div>
    </div>

    <script src="/BEHS-Engineering-Hub/js/script.js"></script>
</body>
</html>
