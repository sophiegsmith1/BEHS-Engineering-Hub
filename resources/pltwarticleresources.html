<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLTW Article Resources | BEHS Engineering</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/BEHS-Engineering-Hub/css/style.css">

    <style>
/* The Main Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
    padding: 20px 0;
}

/* The Card Container */
.media-card {
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 50px 20px 20px 20px; /* Extra top padding for the red label */
    position: relative; 
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* Pushes buttons to the bottom */
    transition: transform 0.2s, border-color 0.2s;
    min-height: 250px;
}

.media-card:hover {
    border-color: #ff4d4d;
    transform: translateY(-5px);
}

/* The Red Category Label */
.category-label {
    color: #ff4d4d;
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    position: absolute;
    top: 15px;
    left: 20px;
    background: rgba(255, 77, 77, 0.1); /* Subtle red glow background */
    padding: 4px 8px;
    border-radius: 4px;
}

/* The Icon/Image Area */
.card-image {
    margin-bottom: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card-icon {
    width: 45px;
    height: 45px;
    object-fit: contain;
}

/* Typography */
.media-card h3 {
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    margin: 0 0 20px 0;
    line-height: 1.3;
}

/* Button Container */
.media-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: auto; /* Locks buttons to the bottom of the card */
}

/* General Button Styling */
.media-btn {
    font-size: 0.8rem;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.2s;
}

.media-btn.article { background: #444; color: white; }
.media-btn.podcast { background: #d4af37; color: black; border: none; cursor: pointer; }
.media-btn.video   { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

    <div class="menu-toggle" id="menu-toggle">☰</div>
    
    <div id="sidebar-container"></div>

    <div class="main">
        <nav class="breadcrumb">
            <a href="/BEHS-Engineering-Hub/index.html">Home</a> / <span>Article Resources</span>
        </nav>

        <h1>PLTW Article Resources</h1>
        <p class="subtitle">Multimedia supplements for the PLTW Curriculum. Search by unit, topic, or media type.</p>

        <div class="search-container">
            <input type="text" id="resourceSearch" onkeyup="filterResources()" placeholder="Search (e.g. 'IED', 'Design Process', 'Video')...">
        </div>

        <div class="grid" id="resource-grid">
            <div style="color: #666; padding: 20px;">Initializing Resource Database...</div>
        </div>
    </div>

    <script src="/BEHS-Engineering-Hub/js/script.js"></script>
</body>
</html>
