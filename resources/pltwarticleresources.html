<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLTW Article Resources | BEHS Engineering</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/BEHS-Engineering-Hub/css/style.css">

    <style>
/* The Main Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 25px;
    padding: 20px 0;
}

/* Updated Resource Card - Exact match to your .card style */
.media-card {
    background: rgba(20, 20, 20, 0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid #2a2a2a;
    border-top: 4px solid #8b0000; /* Dark Red Top Border */
    border-radius: 12px;
    padding: 24px;
    position: relative;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s, border-top-color 0.2s;
    min-height: 280px;
}

.media-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(139, 0, 0, 0.3);
    border-top-color: #d4af37; /* Turns Gold on hover */
}

/* The "Section Highlight" - Small gold text above the title */
.category-label {
    color: #d4af37;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}

/* Icon Area */
.card-image {
    margin-bottom: 15px;
}

.card-icon {
    width: 40px;
    height: 40px;
    object-fit: contain;
    /* Optional: subtle brightness to pop against dark background */
    filter: brightness(1.2);
}

/* Title matching your .card h3 */
.media-card h3 { 
    color: #d4af37; 
    margin-top: 0; 
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.2rem;
}

/* Buttons styled like your index links (.card a) */
.media-links {
    margin-top: auto; /* Forces buttons to bottom */
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.media-btn {
    display: block;
    padding: 12px;
    text-decoration: none;
    color: #ddd;
    background: #1a1a1a;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 500;
    text-align: center;
    border: 1px solid transparent;
    transition: 0.2s;
}

/* Hover effects matching your index links */
.media-btn:hover { 
    background: #8b0000; 
    color: white; 
}

/* Specific styling for media types to distinguish them slightly */
.media-btn.podcast { border-color: rgba(212, 175, 55, 0.3); }
.media-btn.video   { border-color: rgba(139, 0, 0, 0.5); }
    </style>
</head>
<body>

    <div class="menu-toggle" id="menu-toggle">☰</div>
    
    <div id="sidebar-container"></div>

    <div class="main">
        <nav class="breadcrumb">
            <a href="/BEHS-Engineering-Hub/index.html">Home</a> / <span>Article Resources</span>
        </nav>

        <h1>PLTW Article Resources</h1>
        <p class="subtitle">Multimedia supplements for the PLTW Curriculum. Search by unit, topic, or media type.</p>

        <div class="search-container">
            <input type="text" id="resourceSearch" onkeyup="filterResources()" placeholder="Search (e.g. 'IED', 'Design Process', 'Video')...">
        </div>

        <div class="grid" id="resource-grid">
            <div style="color: #666; padding: 20px;">Initializing Resource Database...</div>
        </div>
    </div>

    <script src="/BEHS-Engineering-Hub/js/script.js"></script>
</body>
</html>
